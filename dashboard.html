<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH Login Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: #0a0e1a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: #0d1117;
            border-bottom: 1px solid #1e3a5f;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #00d4ff;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .header .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .container { padding: 25px 30px; }

        /* Server Info Bar */
        .server-info {
            background: #0d1117;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 30px;
            font-size: 13px;
            color: #8899aa;
        }

        .server-info span { color: #00d4ff; }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: #0d1117;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: border-color 0.3s;
        }

        .stat-card:hover { border-color: #00d4ff; }

        .stat-card.danger { border-color: #ff4444; }
        .stat-card.warning { border-color: #ffaa00; }
        .stat-card.success { border-color: #00ff88; }
        .stat-card.info { border-color: #00d4ff; }

        .stat-number {
            font-size: 42px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .danger .stat-number { color: #ff4444; }
        .warning .stat-number { color: #ffaa00; }
        .success .stat-number { color: #00ff88; }
        .info .stat-number { color: #00d4ff; }

        .stat-label {
            font-size: 12px;
            color: #8899aa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #0d1117;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            padding: 12px 20px;
            background: #111827;
            border-bottom: 1px solid #1e3a5f;
            font-size: 13px;
            letter-spacing: 1px;
            color: #00d4ff;
            text-transform: uppercase;
        }

        .panel-body { padding: 15px; }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 8px 10px;
            color: #8899aa;
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid #1e3a5f;
        }

        td {
            padding: 8px 10px;
            border-bottom: 1px solid #0d1117;
            color: #ccd6f6;
        }

        tr:hover td { background: #111827; }

        .badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-failed { background: #ff444422; color: #ff4444; border: 1px solid #ff4444; }
        .badge-success { background: #00ff8822; color: #00ff88; border: 1px solid #00ff88; }

        /* Brute Force Alerts */
        .alert-card {
            background: #1a0a0a;
            border: 1px solid #ff4444;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .alert-card .alert-ip {
            font-size: 18px;
            color: #ff4444;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .alert-card .alert-detail {
            font-size: 12px;
            color: #8899aa;
            margin-bottom: 4px;
        }

        .alert-card .alert-detail span { color: #ffaa00; }

        .no-alerts {
            text-align: center;
            padding: 30px;
            color: #00ff88;
            font-size: 14px;
        }

        /* Last updated */
        .last-updated {
            text-align: right;
            font-size: 11px;
            color: #8899aa;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🛡️ SSH LOGIN MONITOR</h1>
    <div class="status">
        <div class="status-dot"></div>
        <span id="hostname">Loading...</span> |
        <span id="uptime">...</span>
    </div>
</div>

<div class="container">

    <!-- Server Info -->
    <div class="server-info">
        <div>HOST: <span id="info-hostname">...</span></div>
        <div>UPTIME: <span id="info-uptime">...</span></div>
        <div>LAST SCAN: <span id="info-timestamp">...</span></div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card danger">
            <div class="stat-number" id="total-failed">0</div>
            <div class="stat-label">Failed Logins</div>
        </div>
        <div class="stat-card warning">
            <div class="stat-number" id="brute-force">0</div>
            <div class="stat-label">Brute Force Attacks</div>
        </div>
        <div class="stat-card success">
            <div class="stat-number" id="total-success">0</div>
            <div class="stat-label">Successful Logins</div>
        </div>
        <div class="stat-card info">
            <div class="stat-number" id="blocked-ips">0</div>
            <div class="stat-label">Blocked IPs</div>
        </div>
    </div>

    <!-- Main Grid -->
    <div class="main-grid">

        <!-- Recent Failed Logins -->
        <div class="panel">
            <div class="panel-header">📋 Recent Failed Logins</div>
            <div class="panel-body">
                <table>
                    <thead>
                        <tr>
                            <th>IP Address</th>
                            <th>Username</th>
                            <th>Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="failed-logins-table">
                        <tr><td colspan="4" style="text-align:center; color:#8899aa">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Brute Force Alerts -->
        <div class="panel">
            <div class="panel-header">🚨 Brute Force Alerts</div>
            <div class="panel-body" id="brute-force-panel">
                <div style="text-align:center; color:#8899aa">Loading...</div>
            </div>
        </div>

    </div>

    <div class="last-updated">Auto-refreshes every 5 seconds | <span id="last-updated">...</span></div>

</div>

<script>
    const API = 'http://localhost:5000';

    // Fetch status
    async function fetchStatus() {
        const res = await fetch(`${API}/api/status`);
        const data = await res.json();
        document.getElementById('hostname').textContent = data.hostname;
        document.getElementById('uptime').textContent = data.uptime;
        document.getElementById('info-hostname').textContent = data.hostname;
        document.getElementById('info-uptime').textContent = data.uptime;
        document.getElementById('info-timestamp').textContent = data.timestamp;
    }

    // Fetch stats
    async function fetchStats() {
        const res = await fetch(`${API}/api/stats`);
        const data = await res.json();
        document.getElementById('total-failed').textContent = data.total_failed_logins;
        document.getElementById('brute-force').textContent = data.brute_force_attacks;
        document.getElementById('total-success').textContent = data.total_successful_logins;
        document.getElementById('blocked-ips').textContent = data.blocked_ips;
    }

    // Fetch failed logins
    async function fetchFailedLogins() {
        const res = await fetch(`${API}/api/failed-logins`);
        const data = await res.json();
        const tbody = document.getElementById('failed-logins-table');

        if (data.logins.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:#00ff88">No failed logins</td></tr>';
            return;
        }

        // Show last 8, most recent first
        const logins = data.logins.slice(-8).reverse();
        tbody.innerHTML = logins.map(l => `
            <tr>
                <td>${l.ip}</td>
                <td>${l.username}</td>
                <td style="font-size:11px; color:#8899aa">${l.timestamp.substring(11,19)}</td>
                <td><span class="badge badge-failed">FAILED</span></td>
            </tr>
        `).join('');
    }

    // Fetch brute force
    async function fetchBruteForce() {
        const res = await fetch(`${API}/api/brute-force`);
        const data = await res.json();
        const panel = document.getElementById('brute-force-panel');

        if (data.attacks.length === 0) {
            panel.innerHTML = '<div class="no-alerts">✅ No attacks detected</div>';
            return;
        }

        panel.innerHTML = data.attacks.map(a => `
            <div class="alert-card">
                <div class="alert-ip">🚨 ${a.ip}</div>
                <div class="alert-detail">Attempts: <span>${a.count}</span></div>
                <div class="alert-detail">Usernames tried: <span>${a.usernames.join(', ')}</span></div>
                <div class="alert-detail">First seen: <span>${a.first_seen.substring(11,19)}</span></div>
                <div class="alert-detail">Last seen: <span>${a.last_seen.substring(11,19)}</span></div>
            </div>
        `).join('');
    }

    // Refresh all data
    async function refreshAll() {
        try {
            await Promise.all([
                fetchStatus(),
                fetchStats(),
                fetchFailedLogins(),
                fetchBruteForce()
            ]);
            document.getElementById('last-updated').textContent =
                'Last updated: ' + new Date().toLocaleTimeString();
        } catch(e) {
            console.error('API error:', e);
        }
    }

    // Run on load + every 5 seconds
    refreshAll();
    setInterval(refreshAll, 5000);
</script>

</body>
</html>
